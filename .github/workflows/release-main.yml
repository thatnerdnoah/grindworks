name: Build & Release (main, concurrent)

on:
  push:
    branches:
      - main

permissions:
  contents: write

# -------------------------
# Concurrent build job
# -------------------------
jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            export: "Linux/X11"
            artifact: grindworks-linux
          - os: windows-latest
            platform: windows
            export: "Windows Desktop"
            artifact: grindworks-windows
          - os: macos-latest
            platform: macos
            export: "macOS"
            artifact: grindworks-macos

    steps:
      - uses: actions/checkout@v4

      # ---- Version shared across jobs ----
      - name: Generate version
        id: version
        shell: bash
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=main-${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      # ---- Install Godot (per‑runner correct binary) ----
      - name: Install Godot
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            curl -LO https://downloads.tuxfamily.org/godotengine/4.5/Godot_v4.5-stable_linux.x86_64.zip
            unzip Godot_v4.5-stable_linux.x86_64.zip
            chmod +x Godot_v4.5-stable_linux.x86_64
            mv Godot_v4.5-stable_linux.x86_64 godot
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            curl -LO https://downloads.tuxfamily.org/godotengine/4.5/Godot_v4.5-stable_win64.exe.zip
            unzip Godot_v4.5-stable_win64.exe.zip
            mv Godot_v4.5-stable_win64.exe godot.exe
          else
            curl -LO https://downloads.tuxfamily.org/godotengine/4.5/Godot_v4.5-stable_macos.universal.zip
            unzip Godot_v4.5-stable_macos.universal.zip
            chmod +x Godot.app/Contents/MacOS/Godot
          fi

      # ---- Export ----
      - name: Export
        shell: bash
        run: |
          mkdir -p build/${{ matrix.platform }}

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            ./godot.exe --headless --export-release "${{ matrix.export }}" build/${{ matrix.platform }}/grindworks.exe
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            ./Godot.app/Contents/MacOS/Godot --headless --export-release "${{ matrix.export }}" build/${{ matrix.platform }}/Grindworks.app
          else
            ./godot --headless --export-release "${{ matrix.export }}" build/${{ matrix.platform }}/grindworks.x86_64
          fi

      # ---- Package ----
      - name: Package
        shell: bash
        run: |
          cd build
          zip -r ${{ matrix.artifact }}-${{ steps.version.outputs.version }}.zip ${{ matrix.platform }}

      # ---- Upload artifact ----
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/*.zip

  # -------------------------
  # Release job (single)
  # -------------------------
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=main-${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Grindworks – ${{ steps.version.outputs.version }}"
          prerelease: false
          body: |
            Automated release from `main`

            Commit: ${{ github.sha }}
            Platforms: Linux, Windows, macOS
          files: |
            artifacts/**/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
